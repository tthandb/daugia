version: "2"
sql:
  - engine: "postgresql"
    queries: "queries/"
    schema: "migrations/"
    gen:
      go:
        package: "db"
        out: "internal/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_empty_slices: true
        overrides:
          - db_type: "timestamptz"
            go_type: "time.Time"
          - db_type: "timestamptz"
            nullable: true
            go_type:
              type: "*time.Time"
          - db_type: "text"
            nullable: true
            go_type:
              type: "*string"
          - db_type: "int4"
            go_type: "int32"
          - db_type: "int4"
            nullable: true
            go_type:
              type: "*int32"
          - db_type: "int8"
            go_type: "int64"
          - db_type: "int8"
            nullable: true
            go_type:
              type: "*int64"
