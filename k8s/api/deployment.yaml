apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: realestate
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      initContainers:
        - name: migrate
          image: yourdockerhub/daugia-api:latest
          command: ["/app/api", "migrate"]
          envFrom:
            - configMapRef:
                name: realestate-config
            - secretRef:
                name: realestate-secrets
      containers:
        - name: api
          image: yourdockerhub/daugia-api:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: realestate-config
            - secretRef:
                name: realestate-secrets
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
