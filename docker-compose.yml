services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: daugia
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  api:
    image: daugia-api:latest
    depends_on:
      - postgres
      - minio
    ports:
      - "8080:8080"
    volumes:
      - ./lxgnfmrwkbrzajkqwkpt/daugia:/data/daugia:ro
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/daugia?sslmode=disable
      JWT_SECRET: dev-secret-change-in-production
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: articles
      MINIO_USE_SSL: "false"
      CORS_ORIGIN: http://localhost:3000
      SECURE_COOKIE: "false"
      PORT: "8080"
      ADMIN_EMAIL: admin@daugia.vn
      ADMIN_PASSWORD: admin123
      LEGACY_DATA_DIR: /data/daugia

volumes:
  pgdata:
  miniodata:
